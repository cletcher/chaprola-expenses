<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense List - Chaprola Expenses</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="sidebar">
    <div class="logo">
      <h1>Chaprola</h1>
      <span>Expenses</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="add.html">Add Expense</a></li>
      <li><a href="list.html" class="active">Expense List</a></li>
      <li><a href="export.html">Export</a></li>
    </ul>
  </nav>

  <main class="content">
    <header class="page-header">
      <h2>Expense List</h2>
      <p class="subtitle" id="expenseCount">Loading...</p>
    </header>

    <section>
      <div class="filters">
        <div class="filter-group">
          <label for="filterCategory">Category:</label>
          <select id="filterCategory" onchange="applyFilters()">
            <option value="">All Categories</option>
            <option value="Software & Subscriptions">Software & Subscriptions</option>
            <option value="Office Supplies">Office Supplies</option>
            <option value="Travel">Travel</option>
            <option value="Meals & Entertainment">Meals & Entertainment</option>
            <option value="Equipment">Equipment</option>
            <option value="Training & Education">Training & Education</option>
            <option value="Marketing">Marketing</option>
            <option value="Professional Services">Professional Services</option>
            <option value="Utilities">Utilities</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filterMonth">Month:</label>
          <select id="filterMonth" onchange="applyFilters()">
            <option value="">All Months</option>
            <option value="2026-01">January 2026</option>
            <option value="2026-02">February 2026</option>
            <option value="2026-03">March 2026</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filterStatus">Status:</label>
          <select id="filterStatus" onchange="applyFilters()">
            <option value="">All Status</option>
            <option value="approved">Approved</option>
            <option value="pending">Pending</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filterSearch">Search:</label>
          <input type="text" id="filterSearch" placeholder="Vendor, description..." oninput="applyFilters()">
        </div>
        <a href="add.html" class="btn btn-primary" style="margin-left: auto;">Add Expense</a>
      </div>

      <table class="data-table" id="expenseTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Category</th>
            <th>Vendor</th>
            <th>Description</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="7" class="loading">
              <span class="spinner"></span> Loading expenses...
            </td>
          </tr>
        </tbody>
      </table>

      <div id="pagination" class="pagination"></div>
    </section>
  </main>

  <!-- Edit Modal -->
  <div id="editModal" class="modal-overlay" onclick="if(event.target === this) closeModal()">
    <div class="modal">
      <div class="modal-header">
        <h3>Edit Expense</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form onsubmit="saveExpense(event)">
        <input type="hidden" id="editExpenseId">

        <div class="form-row">
          <div class="form-group">
            <label for="editAmount">Amount *</label>
            <input type="number" id="editAmount" step="0.01" min="0" required>
          </div>
          <div class="form-group">
            <label for="editDate">Date *</label>
            <input type="date" id="editDate" required>
          </div>
        </div>

        <div class="form-group">
          <label for="editCategory">Category *</label>
          <select id="editCategory" required>
            <option value="Software & Subscriptions">Software & Subscriptions</option>
            <option value="Office Supplies">Office Supplies</option>
            <option value="Travel">Travel</option>
            <option value="Meals & Entertainment">Meals & Entertainment</option>
            <option value="Equipment">Equipment</option>
            <option value="Training & Education">Training & Education</option>
            <option value="Marketing">Marketing</option>
            <option value="Professional Services">Professional Services</option>
            <option value="Utilities">Utilities</option>
          </select>
        </div>

        <div class="form-group">
          <label for="editVendor">Vendor *</label>
          <input type="text" id="editVendor" required>
        </div>

        <div class="form-group">
          <label for="editDescription">Description *</label>
          <textarea id="editDescription" rows="2" required></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="editPayment">Payment Method</label>
            <select id="editPayment">
              <option value="Credit Card">Credit Card</option>
              <option value="Corporate Card">Corporate Card</option>
              <option value="Check">Check</option>
              <option value="Wire Transfer">Wire Transfer</option>
              <option value="ACH">ACH</option>
              <option value="Cash">Cash</option>
            </select>
          </div>
          <div class="form-group">
            <label for="editStatus">Status</label>
            <select id="editStatus">
              <option value="pending">Pending</option>
              <option value="approved">Approved</option>
            </select>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadExpenseList();
    });
  </script>
</body>
</html>
